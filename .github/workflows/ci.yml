name: CI

on:
  push:
    branches: [main, prod]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22]
    runs-on: ${{ matrix.os }}
    name: Test (${{ matrix.os }})

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install root dependencies
        run: npm ci

      - name: Install extension dependencies
        run: cd extension && npm install --production
        shell: bash

      - name: Pre-install vsce (avoid npx TTY hang on Windows)
        run: npm install -g @vscode/vsce

      - name: Unit tests
        run: npm run test:unit

      - name: UI tests
        run: npm run test:ui

      - name: Build extension
        run: npm run ext:build

      - name: Install CLI globally
        run: npm install -g .

      - name: CLI doctor
        run: qapanda doctor

      - name: CLI help
        run: qapanda help

      - name: CLI agents
        run: qapanda agents
